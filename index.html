<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PME Scout</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

#pme-scout-root {
  --ink: #1B2330;
  --ink-soft: #2E3A4A;
  --paper: #ECE6D5;
  --paper-deep: #DCD3B8;
  --paper-light: #F8F4E9;
  --brass: #A9803D;
  --brass-light: #C9A360;
  --brass-dim: #8C6A2E;
  --forest: #3F6156;
  --forest-bg: #E1E8E1;
  --vermillion: #A63D40;
  --vermillion-bg: #F1DEDD;
  --amber-bg: #F1E6C9;
  --slate: #6B7280;
  --line: rgba(27,35,48,0.15);
  --line-strong: rgba(27,35,48,0.28);
  font-family: 'Inter', -apple-system, sans-serif;
  color: var(--ink);
  background: var(--paper);
  min-height: 100vh;
  position: relative;
  font-size: 14px;
  line-height: 1.5;
}
#pme-scout-root * { box-sizing: border-box; }
#pme-scout-root .serif { font-family: 'Fraunces', Georgia, serif; }
#pme-scout-root .mono { font-family: 'IBM Plex Mono', monospace; }

#pme-scout-root .bg-texture {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.5;
  background-image:
    repeating-linear-gradient(0deg, rgba(27,35,48,0.025) 0px, transparent 1px, transparent 3px),
    repeating-linear-gradient(90deg, rgba(27,35,48,0.015) 0px, transparent 1px, transparent 3px);
}

#pme-scout-root .shell { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 0 20px 60px; }

/* HEADER */
#pme-scout-root .masthead {
  background: var(--ink); color: var(--paper-light);
  border-bottom: 3px solid var(--brass);
  padding: 22px 24px;
  margin-bottom: 0;
}
#pme-scout-root .masthead-inner { max-width: 1180px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 10px; }
#pme-scout-root .wordmark { font-family: 'Fraunces', serif; font-weight: 600; font-size: 27px; letter-spacing: 0.3px; }
#pme-scout-root .wordmark span { color: var(--brass-light); font-style: italic; }
#pme-scout-root .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--paper-deep); opacity: 0.75; margin-top: 4px; }
#pme-scout-root .masthead-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--paper-deep); opacity: 0.8; text-align: right; }

/* TABS */
#pme-scout-root .tabbar { display: flex; gap: 4px; margin: 22px 0 26px; border-bottom: 2px solid var(--line-strong); overflow-x: auto; }
#pme-scout-root .tab-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.6px; text-transform: uppercase;
  background: var(--paper-deep); color: var(--ink-soft); border: 1px solid var(--line-strong); border-bottom: none;
  padding: 10px 18px 9px; cursor: pointer; border-radius: 6px 6px 0 0; white-space: nowrap;
  position: relative; top: 2px; opacity: 0.75; transition: all .15s;
}
#pme-scout-root .tab-btn:hover { opacity: 1; }
#pme-scout-root .tab-btn.active { background: var(--paper-light); color: var(--ink); opacity: 1; font-weight: 600; border-bottom: 2px solid var(--paper-light); top: 2px; }
#pme-scout-root .tab-count { display:inline-block; background: var(--brass); color: var(--paper-light); border-radius: 10px; padding: 0 6px; font-size: 10px; margin-left: 6px; }

/* SECTION HEADERS */
#pme-scout-root h2.section-title { font-family:'Fraunces',serif; font-size: 22px; font-weight: 600; margin: 0 0 4px; }
#pme-scout-root .section-sub { color: var(--slate); font-size: 13px; margin-bottom: 18px; }
#pme-scout-root .eyebrow { font-family:'IBM Plex Mono',monospace; font-size: 10.5px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--brass-dim); margin-bottom: 6px; }

/* INFO BANNER */
#pme-scout-root .info-banner {
  background: var(--paper-light); border: 1px solid var(--line-strong); border-left: 4px solid var(--brass);
  border-radius: 4px; padding: 13px 16px; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 20px; line-height: 1.55;
}
#pme-scout-root .info-banner b { color: var(--ink); }

/* SEARCH LAUNCH BOX */
#pme-scout-root .launch-box { background: var(--paper-light); border: 1px solid var(--line-strong); border-radius: 8px; padding: 20px; margin-bottom: 28px; box-shadow: 0 1px 0 var(--line); }
#pme-scout-root textarea.guidance {
  width: 100%; min-height: 64px; resize: vertical; font-family: 'Inter', sans-serif; font-size: 13px;
  border: 1px solid var(--line-strong); border-radius: 5px; padding: 10px 12px; background: #fff; color: var(--ink);
}
#pme-scout-root textarea.guidance:focus { outline: 2px solid var(--brass-light); outline-offset: 1px; }
#pme-scout-root .launch-row { display: flex; gap: 12px; align-items: center; margin-top: 12px; flex-wrap: wrap; }

/* BUTTONS */
#pme-scout-root button { font-family: 'Inter', sans-serif; cursor: pointer; border-radius: 5px; font-size: 13px; font-weight: 600; padding: 9px 16px; border: 1px solid transparent; transition: all .12s; }
#pme-scout-root button:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }
#pme-scout-root .btn-primary { background: var(--ink); color: var(--paper-light); }
#pme-scout-root .btn-primary:hover { background: var(--ink-soft); }
#pme-scout-root .btn-brass { background: var(--brass); color: #fff; }
#pme-scout-root .btn-brass:hover { background: var(--brass-dim); }
#pme-scout-root .btn-outline { background: transparent; border-color: var(--line-strong); color: var(--ink); }
#pme-scout-root .btn-outline:hover { background: var(--paper-deep); }
#pme-scout-root .btn-danger { background: transparent; border-color: var(--vermillion); color: var(--vermillion); }
#pme-scout-root .btn-danger:hover { background: var(--vermillion-bg); }
#pme-scout-root .btn-sm { padding: 6px 11px; font-size: 12px; }
#pme-scout-root button:disabled { opacity: 0.45; cursor: not-allowed; }
#pme-scout-root .btn-link { background: none; border: none; color: var(--brass-dim); text-decoration: underline; padding: 2px 0; font-weight: 500; }

/* CARDS (dossiers) */
#pme-scout-root .card-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
#pme-scout-root .dossier {
  background: var(--paper-light); border: 1px solid var(--line-strong); border-radius: 8px; padding: 0; overflow: hidden;
  box-shadow: 0 1px 2px rgba(27,35,48,0.06); position: relative;
}
#pme-scout-root .dossier.top-pick { border-color: var(--brass); box-shadow: 0 2px 8px rgba(169,128,61,0.18); }
#pme-scout-root .dossier-head { padding: 16px 18px 12px; border-bottom: 1px dashed var(--line-strong); display: flex; justify-content: space-between; gap: 14px; }
#pme-scout-root .dossier-ref { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--slate); letter-spacing: 0.5px; }
#pme-scout-root .dossier-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin: 3px 0 4px; line-height: 1.25; }
#pme-scout-root .dossier-loc { font-size: 12.5px; color: var(--slate); }
#pme-scout-root .stamp {
  flex-shrink: 0; border: 2px solid var(--forest); color: var(--forest); border-radius: 6px;
  padding: 6px 10px; font-family:'IBM Plex Mono',monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  transform: rotate(3deg); text-align: center; white-space: nowrap; height: fit-content;
}
#pme-scout-root .stamp.warn { border-color: var(--vermillion); color: var(--vermillion); transform: rotate(-2deg); }
#pme-scout-root .stamp .stamp-big { font-size: 15px; display:block; }
#pme-scout-root .top-pick-flag { position:absolute; top:0; right:22px; background: var(--brass); color:#fff; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:1px; padding: 3px 10px; border-radius: 0 0 5px 5px; text-transform:uppercase; }

#pme-scout-root .dossier-body { padding: 16px 18px; }
#pme-scout-root .pitch { font-size: 13px; line-height: 1.6; color: var(--ink-soft); margin-bottom: 14px; }

#pme-scout-root .figures-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 10px; margin-bottom: 16px; }
#pme-scout-root .figure { background: var(--paper); border: 1px solid var(--line); border-radius: 5px; padding: 8px 10px; }
#pme-scout-root .figure-label { font-family:'IBM Plex Mono',monospace; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--slate); margin-bottom: 3px; }
#pme-scout-root .figure-value { font-family:'IBM Plex Mono',monospace; font-size: 15px; font-weight: 600; color: var(--ink); }
#pme-scout-root .figure-note { font-size: 10.5px; color: var(--slate); margin-top: 2px; line-height:1.3; }

#pme-scout-root .criteria-list { list-style: none; margin: 0 0 14px; padding: 0; }
#pme-scout-root .criteria-list li { display: flex; gap: 9px; padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 12.5px; align-items: flex-start; }
#pme-scout-root .criteria-list li:last-child { border-bottom: none; }
#pme-scout-root .chip { flex-shrink:0; font-family:'IBM Plex Mono',monospace; font-size: 9.5px; font-weight: 700; letter-spacing: 0.4px; padding: 2px 7px; border-radius: 3px; margin-top: 1px; white-space: nowrap; }
#pme-scout-root .chip-ok { background: var(--forest-bg); color: var(--forest); }
#pme-scout-root .chip-check { background: var(--amber-bg); color: var(--brass-dim); }
#pme-scout-root .chip-warn { background: var(--vermillion-bg); color: var(--vermillion); }
#pme-scout-root .crit-text b { color: var(--ink); }
#pme-scout-root .crit-text { color: var(--ink-soft); }

#pme-scout-root .vigilance-box { background: var(--vermillion-bg); border-left: 3px solid var(--vermillion); border-radius: 4px; padding: 10px 12px; margin-bottom: 14px; }
#pme-scout-root .vigilance-box.positive { background: var(--forest-bg); border-left-color: var(--forest); }
#pme-scout-root .vigilance-box.positive .v-title { color: var(--forest); }
#pme-scout-root .vigilance-box .v-title { font-family:'IBM Plex Mono',monospace; font-size: 10px; text-transform:uppercase; letter-spacing:0.6px; color: var(--vermillion); font-weight:700; margin-bottom:4px; }
#pme-scout-root .vigilance-box div.v-item { font-size: 12px; color: var(--ink-soft); margin-bottom: 2px; }
#pme-scout-root .fin-table input.fin-input { width:100%; border:1px solid var(--line-strong); border-radius:4px; padding:5px 7px; font-family:'IBM Plex Mono',monospace; font-size:12px; background:#fff; }
#pme-scout-root .fin-table tr.fin-computed td { background: var(--paper-deep); }
#pme-scout-root .fin-table tr.fin-computed.fin-warn td:last-child { color: var(--vermillion); }
#pme-scout-root .fin-table th { white-space: nowrap; }
#pme-scout-root .fin-dossier { margin-bottom: 22px; }
#pme-scout-root .fin-note { font-size:11.5px; color:var(--slate); margin: 4px 0 10px; line-height:1.5; }
#pme-scout-root textarea.notes-box { width:100%; min-height:56px; border:1px dashed var(--line-strong); border-radius:5px; padding:8px 10px; font-family:'Inter',sans-serif; font-size:12.5px; background:var(--paper-light); margin-bottom:12px; resize:vertical; }

#pme-scout-root .source-line { font-size: 11px; color: var(--slate); margin-bottom: 14px; }
#pme-scout-root .source-line a { color: var(--brass-dim); }

#pme-scout-root .dossier-actions { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid var(--line); }

/* GROUPS / TAGS */
#pme-scout-root .tag { display:inline-block; background: var(--paper-deep); color: var(--ink-soft); font-size: 10.5px; font-family:'IBM Plex Mono',monospace; padding: 2px 8px; border-radius: 10px; margin: 0 5px 5px 0; }
#pme-scout-root .tag.active { background: var(--ink); color: var(--paper-light); }
#pme-scout-root .group-filter-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; align-items:center; }
#pme-scout-root .group-filter-row button.tag-btn { border:1px solid var(--line-strong); background: var(--paper-light); font-family:'IBM Plex Mono',monospace; font-size:11px; padding:4px 11px; border-radius: 12px; color: var(--ink-soft); }
#pme-scout-root .group-filter-row button.tag-btn.active { background: var(--ink); color: var(--paper-light); border-color: var(--ink); }
#pme-scout-root select.status-select { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; border-radius:12px; padding:4px 10px; border:1px solid var(--line-strong); background:var(--paper-light); color:var(--ink-soft); }
#pme-scout-root select.status-select.status-a_contacter, #pme-scout-root button.tag-btn.status-a_contacter.active { background: var(--brass); color:#fff; border-color:var(--brass); }
#pme-scout-root select.status-select.status-contact_pris, #pme-scout-root button.tag-btn.status-contact_pris.active { background: var(--amber-bg); color:var(--brass-dim); border-color:var(--brass-light); }
#pme-scout-root select.status-select.status-negociation, #pme-scout-root button.tag-btn.status-negociation.active { background: var(--forest); color:#fff; border-color:var(--forest); }
#pme-scout-root select.status-select.status-acquis, #pme-scout-root button.tag-btn.status-acquis.active { background: var(--ink); color:#fff; border-color:var(--ink); }
#pme-scout-root select.status-select.status-abandonne, #pme-scout-root button.tag-btn.status-abandonne.active { background: var(--slate); color:#fff; border-color:var(--slate); }
#pme-scout-root .dossier.status-abandonne { opacity: 0.55; }
#pme-scout-root select.conf-select { font-family:'IBM Plex Mono',monospace; font-size:10.5px; border-radius:12px; padding:3px 8px; border:1px solid var(--line-strong); background:var(--paper-light); color:var(--ink-soft); }
#pme-scout-root select.conf-select.conf-teaser { background: var(--amber-bg); color: var(--brass-dim); border-color: var(--brass-light); }
#pme-scout-root select.conf-select.conf-verifie { background: var(--forest-bg); color: var(--forest); border-color: var(--forest); }
#pme-scout-root select.conf-select.conf-dataroom { background: var(--ink); color: var(--paper-light); border-color: var(--ink); }
#pme-scout-root .meta-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
#pme-scout-root .badge-mini { font-family:'IBM Plex Mono',monospace; font-size:10.5px; padding:3px 9px; border-radius:12px; border:1px solid var(--line-strong); background:var(--paper-light); color:var(--ink-soft); }
#pme-scout-root .badge-mini.warn { background: var(--vermillion-bg); color: var(--vermillion); border-color: var(--vermillion); }
#pme-scout-root .badge-mini.soon { background: var(--amber-bg); color: var(--brass-dim); border-color: var(--brass-light); }
#pme-scout-root .na-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:10px; }
#pme-scout-root .na-row input[type=date] { border:1px solid var(--line-strong); border-radius:5px; padding:5px 8px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; background:#fff; }
#pme-scout-root .na-row input[type=text] { flex:1; min-width:140px; border:1px solid var(--line-strong); border-radius:5px; padding:5px 8px; font-size:12px; background:#fff; }
#pme-scout-root .checklist-item { display:flex; align-items:flex-start; gap:9px; padding:7px 0; border-bottom:1px solid var(--line); font-size:13px; }
#pme-scout-root .checklist-item input[type=checkbox] { margin-top:2px; }
#pme-scout-root .checklist-date { font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--forest); margin-left:auto; white-space:nowrap; }
#pme-scout-root .verify-summary { font-size:12px; margin-bottom:10px; padding:8px 10px; border-radius:5px; background:var(--paper-deep); }
#pme-scout-root .verify-summary.has-alerts { background: var(--vermillion-bg); color: var(--vermillion); }

/* MODAL */
#pme-scout-root .modal-overlay { position: fixed; inset: 0; background: rgba(27,35,48,0.55); z-index: 100; display:flex; align-items:center; justify-content:center; padding: 20px; }
#pme-scout-root .modal-box { background: var(--paper-light); border-radius: 8px; max-width: 560px; width:100%; max-height: 86vh; overflow-y:auto; padding: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
#pme-scout-root .modal-title { font-family:'Fraunces',serif; font-size: 19px; font-weight:600; margin-bottom: 6px; }
#pme-scout-root .modal-sub { font-size: 12.5px; color: var(--slate); margin-bottom: 16px; line-height:1.5; }
#pme-scout-root .modal-box label { display:block; font-size:12px; font-weight:600; margin: 12px 0 5px; }
#pme-scout-root .modal-box input[type=text], #pme-scout-root .modal-box input[type=number], #pme-scout-root .modal-box input[type=url], #pme-scout-root .modal-box select, #pme-scout-root .modal-box textarea {
  width:100%; border:1px solid var(--line-strong); border-radius:5px; padding:8px 10px; font-family:'Inter',sans-serif; font-size:13px; background:#fff;
}
#pme-scout-root .modal-box textarea { min-height: 64px; resize: vertical; }
#pme-scout-root .modal-box textarea.readonly-copy { font-family:'IBM Plex Mono',monospace; font-size:11.5px; min-height:180px; background: var(--paper); color: var(--ink-soft); }
#pme-scout-root .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
#pme-scout-root .radio-row { display:flex; flex-direction:column; gap:6px; margin-top: 8px; }
#pme-scout-root .radio-row label { display:flex; align-items:center; gap:8px; font-weight: 400; font-size: 13px; margin:0; }
#pme-scout-root .modal-close-x { position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; color:var(--slate); padding:2px 6px; }
#pme-scout-root .modal-box.wide { max-width: 680px; }
#pme-scout-root .form-divider { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--brass-dim); border-top:1px solid var(--line); margin-top:20px; padding-top:14px; }
#pme-scout-root .form-divider:first-child { border-top:none; margin-top:0; padding-top:0; }
#pme-scout-root .modal-box textarea.list-textarea { min-height:92px; font-size:12.5px; }
#pme-scout-root .paste-box { border:1px dashed var(--brass); border-radius:6px; padding:12px; margin-top:16px; background: var(--amber-bg); }
#pme-scout-root .agent-box { border:1px solid var(--forest); border-radius:6px; padding:14px; background: var(--forest-bg); }
#pme-scout-root .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper-light); padding: 11px 20px; border-radius: 6px; font-size: 13px; z-index: 200; box-shadow: 0 6px 20px rgba(0,0,0,0.3); max-width: 90vw; }

/* GRID for group form */
#pme-scout-root .two-col { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 560px) { #pme-scout-root .two-col { grid-template-columns: 1fr; } }

/* EMPTY STATE */
#pme-scout-root .empty-state { text-align:center; padding: 50px 20px; color: var(--slate); }
#pme-scout-root .empty-state .serif { font-size: 18px; color: var(--ink-soft); display:block; margin-bottom:6px; }

/* DD VIEW */
#pme-scout-root .dd-nav { display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 20px; }
#pme-scout-root .dd-nav button { font-family:'IBM Plex Mono',monospace; font-size:11.5px; }
#pme-scout-root .dd-doc { background: var(--paper-light); border: 1px solid var(--line-strong); border-radius: 8px; padding: 28px 30px; }
#pme-scout-root .dd-doc-header { border-bottom: 2px solid var(--ink); padding-bottom: 14px; margin-bottom: 18px; display:flex; justify-content:space-between; gap: 16px; flex-wrap:wrap; }
#pme-scout-root .dd-doc-title { font-family:'Fraunces',serif; font-size: 23px; font-weight:700; }
#pme-scout-root .dd-doc-ref { font-family:'IBM Plex Mono',monospace; font-size: 11px; color: var(--slate); margin-bottom: 4px; }
#pme-scout-root .dd-verdict { font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; border:2px solid var(--forest); color:var(--forest); padding:8px 14px; border-radius:5px; text-align:center; white-space:nowrap; }
#pme-scout-root .dd-section { margin-bottom: 24px; }
#pme-scout-root .dd-section h3 { font-family:'Fraunces',serif; font-size:16px; font-weight:600; border-left: 4px solid var(--brass); padding-left:10px; margin-bottom:10px; }
#pme-scout-root .dd-section h4 { font-size: 13px; font-weight:700; margin: 14px 0 8px; color: var(--ink-soft); }
#pme-scout-root .dd-table { width:100%; border-collapse: collapse; font-size: 12.5px; margin-bottom: 12px; }
#pme-scout-root .dd-table th, #pme-scout-root .dd-table td { border: 1px solid var(--line-strong); padding: 8px 10px; text-align: left; vertical-align: top; }

  { id: 'dataroom', label: 'Data room (post-NDA)' }
];
function confidenceLabel(id) { var o = CONFIDENCE_OPTIONS.find(function(x){return x.id===id;}); return o ? o.label : CONFIDENCE_OPTIONS[0].label; }

var DOC_CHECKLIST_ITEMS = [
  { id: 'liasses', label: 'Liasses fiscales des 3 derniers exercices' },
  { id: 'bilans', label: 'Bilans & comptes de résultat détaillés' },
  { id: 'urssaf', label: 'Attestation de régularité URSSAF' },

];
function docProgress(l) {
  var ck = l.docChecklist || {};
  var done = DOC_CHECKLIST_ITEMS.filter(function(it){ return ck[it.id] && ck[it.id].done; }).length;
  return { done: done, total: DOC_CHECKLIST_ITEMS.length };
}
function todayStr() { return new Date().toISOString().slice(0,10); }
function naUrgency(l) {
  if (!l.nextAction || !l.nextAction.date) return 'none';
  var t = todayStr();
  if (l.nextAction.date < t) return 'overdue';
  var in3 = new Date(Date.now() + 3*24*3600*1000).toISOString().slice(0,10);
  if (l.nextAction.date <= in3) return 'soon';
  return 'later';
}

function safeParse(str, fallback) {
  try { return JSON.parse(str); } catch(e) { return fallback; }
}

async function loadUserData() {
  try {
    var res = await sb.from('app_state').select('data').eq('user_id', currentUser.id).maybeSingle();
    if (res.data && res.data.data && Object.keys(res.data.data).length) {
      state = Object.assign({}, freshDefaultState(), res.data.data);
    } else {
      state = freshDefaultState();
    }
  } catch(e) { state = freshDefaultState(); }
  render();
}

async function loadState() {
  try {
    var sessionRes = await sb.auth.getSession();
    if (sessionRes && sessionRes.data && sessionRes.data.session) {
      currentUser = sessionRes.data.session.user;
      await loadUserData();
      return;
    }
  } catch(e) { /* fall through to auth screen */ }
  renderAuthScreen();
}

async function persist() {
  if (!currentUser) return;
  try {
    await sb.from('app_state').upsert({ user_id: currentUser.id, data: state, updated_at: new Date().toISOString() });
  } catch(e) {
    showToast("Erreur de sauvegarde — réessaie dans un instant.");
  }
}

sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
    currentUser = session ? session.user : null;
    if (currentUser) loadUserData();
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    state = freshDefaultState();
    renderAuthScreen();
  }
});

/* ============================= HELPERS ============================= */

function uid(prefix) { return prefix + '-' + Date.now() + '-' + Math.floor(Math.random()*1000); }
function formatDateFr(iso) {
  try { return new Date(iso).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'numeric'}); }
  catch(e) { return iso || '—'; }
}
function esc(s) { return (s===undefined||s===null) ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isExcluded(refOrId) {
  return state.excludedListings.some(function(e){ return e.matchKey === refOrId; });
}
function showToast(msg) {
  ui.toast = msg;
  renderToast();
  setTimeout(function(){ ui.toast = null; renderToast(); }, 4200);
}
function renderToast() {
  var root = document.getElementById('psr-toast-root');
  root.innerHTML = ui.toast ? ('<div class="toast">' + esc(ui.toast) + '</div>') : '';
}
function findSaved(id) { return state.savedListings.find(function(l){ return l.id === id; }); }
function findProposal(id) { return state.currentProposals.find(function(p){ return p.id === id; }); }
function getDD(sourceId) { return DUE_DILIGENCE[sourceId] || state.customDD[sourceId]; }
function getEffectiveDD(sourceId) {
  var base = getDD(sourceId);
  if (!base) return null;
  var add = state.ddAddenda[sourceId];
  return {
    verdict: (add && add.verdictOverride) || base.verdict,
    verdictTone: (add && add.verdictToneOverride) || base.verdictTone,
    dateAnalyse: base.dateAnalyse,
    sections: (base.sections || []).concat(add && add.sections ? add.sections : [])
  };
}
function allExcludedMatchKeys() {
  return state.excludedListings.map(function(e){ return e.matchKey; });
}
function visibleProposals() {
  var excludedKeys = allExcludedMatchKeys();
  return state.currentProposals.filter(function(p){ return excludedKeys.indexOf(p.ref) === -1 && excludedKeys.indexOf(p.id) === -1; });
}

function viewDD() {

  html += '<h2 class="section-title">Due diligence</h2>';

      html += '<div style="margin-top:10px;text-align:center;font-size:12.5px;color:var(--slate);">'+withoutDD.length+' annonce(s) sauvegardée(s) en attente de due diligence.</div>';

function levelClass(lvl) {
  var l = (lvl||'').toUpperCase();
  if (l==='ELEVE'||l==='ÉLEVÉ') return 'chip-warn';
  if (l==='MODERE'||l==='MODÉRÉ') return 'chip-check';
  return 'chip-ok';
}

function renderDDDoc(sourceId) {
  var dd = getEffectiveDD(sourceId);
  var proposal = findProposal(sourceId);
  var saved = state.savedListings.find(function(l){return l.sourceId===sourceId;});
  var name = proposal ? proposal.name : (saved ? saved.name : sourceId);
  var ref = proposal ? (proposal.source+' · '+proposal.ref) : (saved && saved.ref ? saved.ref : '');
  var html = '<div class="dd-doc">';
  html += '<div class="dd-doc-header"><div>';
  html += '<div class="dd-doc-ref mono">'+esc(ref)+' · Analyse du '+esc(dd.dateAnalyse)+'</div>';
  html += '<div class="dd-doc-title">'+esc(name)+'</div>';
  html += '</div><div class="dd-verdict">'+esc(dd.verdict)+'</div></div>';

  dd.sections.forEach(function(sec){
    html += '<div class="dd-section"><h3>'+esc(sec.h)+'</h3>';
    if (sec.table) {
      html += '<table class="dd-table">' + sec.table.map(function(row){
        return '<tr><th style="width:34%;">'+esc(row[0])+'</th><td>'+esc(row[1])+'</td></tr>';
      }).join('') + '</table>';
    }
    if (sec.criteriaTable) {
      html += '<table class="dd-table"><tr><th>Critère</th><th>Statut</th><th>Observation</th></tr>';
      html += sec.criteriaTable.map(function(c){
        return '<tr><td>'+c.n+'. '+esc(c.label)+'</td><td>'+statusChip(c.status)+'</td><td>'+esc(c.note)+'</td></tr>';
      }).join('') + '</table>';
      if (sec.verdictLine) html += '<div class="dd-para"><b>'+esc(sec.verdictLine)+'</b></div>';
    }
    if (sec.vigilanceTable) {
      html += '<table class="dd-table"><tr><th>Point de vigilance</th><th>Niveau</th><th>Action recommandée</th></tr>';
      html += sec.vigilanceTable.map(function(v){
        return '<tr><td>'+esc(v.label)+'</td><td><span class="chip '+levelClass(v.level)+'">'+esc(v.level)+'</span></td><td>'+esc(v.note)+'</td></tr>';
      }).join('') + '</table>';
    }
    (sec.sub||[]).forEach(function(s){
      html += '<h4>'+esc(s.h4)+'</h4>';
      if (s.paras) s.paras.forEach(function(p){ html += '<div class="dd-para">'+esc(p)+'</div>'; });
      if (s.list) html += '<ul class="dd-list">'+s.list.map(function(li){return '<li>'+esc(li)+'</li>';}).join('')+'</ul>';
      if (s.table2) {
        html += '<table class="dd-table"><tr>'+s.table2.headers.map(function(h){return '<th>'+esc(h)+'</th>';}).join('')+'</tr>';
        html += s.table2.rows.map(function(r){ return '<tr>'+r.map(function(c){return '<td class="num">'+esc(c)+'</td>';}).join('')+'</tr>'; }).join('');
        html += '</table>';
      }
    });
    if (sec.verdictText) html += '<div class="dd-para" style="font-weight:600;">'+esc(sec.verdictText)+'</div>';
    html += '</div>';
  });

  html += '<div class="dossier-actions" style="margin-top:8px;"><button class="btn-outline btn-sm" onclick="PSR.requestDeepenDD(\''+sourceId+'\')">Approfondir la Due Diligence</button></div>';
  html += renderQABox(sourceId, 'dd');
  html += '</div>';
  return html;
}

function summarizeDDForDeepen(dd) {
  var lines = [];
  (dd.sections||[]).forEach(function(s){
    var line = "- " + s.h;
    if (s.verdictLine) line += " (" + s.verdictLine + ")";
    lines.push(line);
  });
  return lines.join("\n");
}

var DEEPEN_JSON_SCHEMA_HINT =
  'Réponds avec UNIQUEMENT un bloc ```json contenant un objet unique, ce schéma exact :\n' +
  '{\n' +
  '  "updatedVerdict": "... uniquement si le verdict global doit changer, sinon null",\n' +
  '  "updatedVerdictTone": "ok|attention|ko — uniquement si changement, sinon null",\n' +

  '  ]\n' +
  '  // newSections peut contenir plusieurs éléments, mêmes formats que les sections existantes :\n' +
  '  // table (tableau clé/valeur), criteriaTable+verdictLine, vigilanceTable, sub (h4+paras/list), verdictText\n' +
  '}';

function viewCompare() {
  var html = '';
  html += '<div class="eyebrow">Étape 4</div>';
  html += '<h2 class="section-title">Comparaison</h2>';
  html += '<p class="section-sub">Sélectionne au moins deux annonces sauvegardées pour générer un tableau récapitulatif des points clés.</p>';

  if (state.savedListings.length === 0) {
    html += '<div class="empty-state"><span class="serif">Rien à comparer pour l\'instant</span>Sauvegarde d\'abord des annonces depuis l\'onglet Recherche.</div>';
    return html;
  }

  html += '<div class="select-row">';
  state.savedListings.forEach(function(l){
    var checked = state.comparisonSelection.indexOf(l.id) !== -1;
    html += '<div class="select-chip '+(checked?'selected':'')+'" onclick="PSR.toggleCompareSelection(\''+l.id+'\')"><input type="checkbox" '+(checked?'checked':'')+'/>'+esc(l.name)+'</div>';
  });
  html += '</div>';

  var selected = state.savedListings.filter(function(l){ return state.comparisonSelection.indexOf(l.id) !== -1; });
  if (selected.length < 2) {
    html += '<div class="empty-state"><span class="serif">Sélectionne au moins 2 annonces</span>Coche-les ci-dessus pour construire le tableau comparatif.</div>';
    return html;
  }

  var rows = [
    {label:"Secteur", get:function(l){return l.sector||'—';}},
    {label:"Localisation", get:function(l){return l.location||'—';}},
    {label:"Chiffre d'affaires", get:function(l){return l.ca||'—';}},
    {label:"EBITDA", get:function(l){return l.ebitda||'—';}},
    {label:"Résultat net", get:function(l){return l.resultat||'—';}},
    {label:"Prix indicatif", get:function(l){return l.prix||'—';}},
    {label:"Multiple", get:function(l){return l.multiple||'—';}},
    {label:"Critères validés", get:function(l){
      var p = findProposal(l.sourceId);
      if (!p) return '—';
      var ok = p.criteria.filter(function(c){return c.status==='ok';}).length;
      return ok + ' / 5';
    }},
    {label:"Vigilance majeure", get:function(l){
      var p = findProposal(l.sourceId);
      if (!p || !p.vigilance || !p.vigilance.length) return 'Aucune identifiée';
      var high = p.vigilance.filter(function(v){return v.level==='eleve';});
      return high.length ? high.map(function(v){return v.label;}).join(' · ') : p.vigilance[0].label;
    }},
    {label:"Verdict DD", get:function(l){
      var dd = getEffectiveDD(l.sourceId);
      return dd ? dd.verdict : 'Non générée';
    }},
    {label:"AJOUT — Financement : statut", get:function(l){
      if (state.financingSelection.indexOf(l.id) === -1) return 'Pas encore dans Financement et stress test';
      var m = computeFinancingModel(getFinancingData(l));
      return m.dealInteressant ? 'OK — critères remplis' : 'À ajuster';
    }},
    {label:"AJOUT — Cash-flow année 1", get:function(l){
      if (state.financingSelection.indexOf(l.id) === -1) return '—';
      return fmtEUR(computeFinancingModel(getFinancingData(l)).cashFlow);
    }},
    {label:"AJOUT — Remboursement / EBE", get:function(l){
      if (state.financingSelection.indexOf(l.id) === -1) return '—';
      var r = computeFinancingModel(getFinancingData(l)).ratioRembEBE;
      return r===null ? '—' : fmtPct1(r*100);
    }},
    {label:"AJOUT — Confiance des données", get:function(l){
      return confidenceLabel(l.dataConfidence||'teaser');
    }},
    {label:"AJOUT — Vérif. comptes déposés", get:function(l){
      if (!l.verification || !l.verification.result) return 'Non faite';
      var nb = (l.verification.result.alertes||[]).length;
      return nb > 0 ? (nb + ' alerte(s)') : 'OK — aucune alerte';
    }},
    {label:"AJOUT — Prix cible d'offre", get:function(l){
      if (state.financingSelection.indexOf(l.id) === -1) return '—';
      var oe = computeOfferAndExit(getFinancingData(l), parseNumberLoose(l.prix));
      return fmtEUR(oe.prixCible);
    }},
    {label:"AJOUT — Score global", get:function(l){
      var p = findProposal(l.sourceId);
      var dd = getEffectiveDD(l.sourceId);
      var inFin = state.financingSelection.indexOf(l.id) !== -1;
      var parts = [];
      var allGood = true;
      if (p) {
        var okCount = p.criteria.filter(function(c){return c.status==='ok';}).length;
        var highVig = p.vigilance && p.vigilance.some(function(v){return v.level==='eleve';});
        parts.push(okCount+'/5 critères');
        if (okCount < 4 || highVig) allGood = false;
      }
      if (dd) {
        parts.push('DD ' + (dd.verdictTone==='ok' ? 'favorable' : dd.verdictTone==='attention' ? 'à négocier' : 'défavorable'));
        if (dd.verdictTone !== 'ok') allGood = false;
      }
      if (inFin) {
        var m = computeFinancingModel(getFinancingData(l));
        parts.push('financement ' + (m.dealInteressant ? 'OK' : 'à ajuster'));
        if (!m.dealInteressant) allGood = false;
      }
      if (!parts.length) return 'Données insuffisantes';
      return (allGood ? '✓ ' : '⚠ ') + parts.join(' · ');
    }}
  ];

  html += '<div class="compare-table-wrap"><table class="compare-table"><tr><th>Critère</th>' + selected.map(function(l){return '<th>'+esc(l.name)+'</th>';}).join('') + '</tr>';
  rows.forEach(function(r){
    html += '<tr><td>'+esc(r.label)+'</td>' + selected.map(function(l){return '<td>'+esc(r.get(l))+'</td>';}).join('') + '</tr>';
  });
  html += '</table></div>';

  var compareKey = 'compare-' + selected.map(function(l){return l.id;}).sort().join('-');
  html += renderQABox(compareKey, 'compare');

  return html;
}

function handleImportResult(res, sourceUrl, pdfName) {
  var statusEl = document.getElementById('import-status');
  if (res.error) { if (statusEl) statusEl.textContent = 'Erreur : ' + (res.error.message || res.error); return; }
  if (res.data && res.data.error) { if (statusEl) statusEl.textContent = 'Erreur : ' + res.data.error; return; }
  var raw = res.data && res.data.text;
  var cleaned = (raw||'').replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  var parsed;
  try { parsed = JSON.parse(cleaned); }
  catch(e) { if (statusEl) statusEl.textContent = 'Réponse non exploitable — réessaie.'; return; }
  Object.keys(parsed).forEach(function(k){ if (parsed[k] === 'Non trouvé') parsed[k] = ''; });
  if (sourceUrl && !parsed.url) parsed.url = sourceUrl;
  if (pdfName && !parsed.source) parsed.source = 'PDF importé (' + pdfName + ')';
  ui.modalCtx = { extracted: parsed };
  render();
}

function buildSearchPrompt(guidance, excludedLines) {
  var parts = ["Lance la recherche.", "", formatCriteriaForPrompt()];
  if (guidance) parts.push("", "Instructions complémentaires : " + guidance);
  if (excludedLines.length) parts.push("", "Ne me repropose jamais ces annonces déjà écartées :", excludedLines.join("\n"));
  parts.push("", PROPOSAL_JSON_SCHEMA_HINT);
  return parts.join("\n");
}

/* ============================= FINANCEMENT & STRESS TEST — moteur de calcul ============================= */
/* Réplique fidèle des 3 onglets de "Tableau d'analyse et calculateur automatique de valorisation" :
   Input | FINANCEMENT & CASHFLOW | STRESS TEST — mêmes formules (PMT Excel, EBE retraité, scénarios).
   Les lignes marquées "AJOUT" plus bas dans le rendu sont des ajouts de Claude, absents du fichier d'origine. */

function parseNumberLoose(str) {
  if (str === null || str === undefined || str === '') return 0;
  var s = String(str);
  var mMatch = s.match(/([\d]+[.,]?\d*)\s*M\s*€/i);
  if (mMatch) return Math.round(parseFloat(mMatch[1].replace(',','.')) * 1000000);
  var kMatch = s.match(/([\d]+[.,]?\d*)\s*k\s*€/i);
  if (kMatch) return Math.round(parseFloat(kMatch[1].replace(',','.')) * 1000);
  var plainMatch = s.match(/([\d][\d\s]{2,})\s*€/);
  if (plainMatch) return parseInt(plainMatch[1].replace(/\s/g,''),10) || 0;
  var anyNum = s.match(/[\d]+[.,]?\d*/);
  if (anyNum) return Math.round(parseFloat(anyNum[0].replace(',','.'))) || 0;
  return 0;
}

function fmtEUR(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n).toLocaleString('fr-FR') + ' €';
}
function fmtPct1(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (Math.round(n*10)/10).toLocaleString('fr-FR') + ' %';
}

/* PMT Excel-exact : paiement mensuel d'un prêt amortissable (taux annuel en %, durée en années) */
function pmtMonthly(principal, annualRatePct, years) {
  principal = principal || 0; years = years || 0;
  var n = years * 12;
  if (!principal || !n) return 0;
  var r = (annualRatePct||0) / 100 / 12;
  if (Math.abs(r) < 1e-9) return principal / n;
  return principal * r / (1 - Math.pow(1+r, -n));
}

function defaultFinancingData(listing) {
  var prixNum = parseNumberLoose(listing.prix);
  return {
    ca: parseNumberLoose(listing.ca),
    ebeComptable: parseNumberLoose(listing.ebitda),
    remuActuelle: parseNumberLoose(listing.salaireDirigeant),
    remuMarche: 0,
    chargesExcep: 0,
    dettesExistantes: 0,
    tresorerie: 0,
    capex: 0,
    topClientsPct: 0,
    croissanceCA: 0,
    multipleValo: 3,
    apport: 0,
    detteBancaire: prixNum,
    tauxPct: 4.8,
    dureeAnnees: 7,
    vendeurMontant: 0,
    vendeurTauxPct: 0,
    vendeurDureeAnnees: 3,
    chocCAPct: 20,
    multipleCibleOffre: 2.5,
    multipleRupture: 3,
    leverDigital: 0,
    leverPricing: 0,
    leverAutre: 0,
    exitYears: 6,
    exitMultiple: 3
  };
}

function computeOfferAndExit(fd, prixDemandeNum) {
  var ebe = (fd.ebeComptable||0) + ((fd.remuActuelle||0) - (fd.remuMarche||0)) + (fd.chargesExcep||0);
  var adj = (fd.tresorerie||0) - (fd.dettesExistantes||0);
  var prixCible = (fd.multipleCibleOffre||0) * ebe + adj;
  var prixRupture = (fd.multipleRupture||0) * ebe + adj;
  var ecartDemandeCible = prixDemandeNum - prixCible;
  var statutPrix = prixDemandeNum <= prixCible ? 'sous_cible' : (prixDemandeNum <= prixRupture ? 'negociable' : 'hors_limite');
  var leviers = (fd.leverDigital||0) + (fd.leverPricing||0) + (fd.leverAutre||0);
  var ebePostLeviers = ebe + leviers;
  var croissance = (fd.croissanceCA||0)/100;
  var ebeSortie = ebePostLeviers * Math.pow(1+croissance, fd.exitYears||0);
  var valeurSortie = (fd.exitMultiple||0) * ebeSortie;
  var gainBrut = valeurSortie - prixDemandeNum;
  return { ebe:ebe, prixCible:prixCible, prixRupture:prixRupture, ecartDemandeCible:ecartDemandeCible, statutPrix:statutPrix,
    leviers:leviers, ebePostLeviers:ebePostLeviers, ebeSortie:ebeSortie, valeurSortie:valeurSortie, gainBrut:gainBrut };
}

function getFinancingData(listing) {
  var def = defaultFinancingData(listing);
  var existing = state.financingData[listing.id];
  return existing ? Object.assign({}, def, existing) : def;
}

function computeFinancingModel(fd) {
  var ebeRetraite = (fd.ebeComptable||0) + ((fd.remuActuelle||0) - (fd.remuMarche||0)) + (fd.chargesExcep||0);
  var valorisation = ebeRetraite * (fd.multipleValo||0);

  var mensualiteBanque = pmtMonthly(fd.detteBancaire, fd.tauxPct, fd.dureeAnnees);
  var remboursementBancaireAnnuel = mensualiteBanque * 12;
  var mensualiteVendeur = pmtMonthly(fd.vendeurMontant, fd.vendeurTauxPct, fd.vendeurDureeAnnees);
  var remboursementVendeurAnnuel = mensualiteVendeur * 12;
  var remboursementAnnuel = remboursementBancaireAnnuel + remboursementVendeurAnnuel;

  var cashFlow = ebeRetraite - remboursementAnnuel - (fd.capex||0);
  var cashReturn = fd.apport ? (cashFlow / fd.apport) : null;
  var ratioRembEBE = ebeRetraite !== 0 ? (remboursementAnnuel/ebeRetraite) : null;

  var ebeStress1 = ebeRetraite * (1 - (fd.chocCAPct||0)/100);
  var cfStress1 = ebeStress1 - remboursementAnnuel - (fd.capex||0);
  var ebeStress2 = ebeRetraite * (1 - (fd.topClientsPct||0)/100);
  var cfStress2 = ebeStress2 - remboursementAnnuel - (fd.capex||0);

  var flagCashFlowPositif = cashFlow >= 0;
  var flagRatioOK = ratioRembEBE !== null && ratioRembEBE < 0.70;
  var flagStressOK = cfStress1 >= 0 && cfStress2 >= 0;
  var dealInteressant = flagCashFlowPositif && flagRatioOK && flagStressOK;

  var flagClientRisk = (fd.topClientsPct||0) > 30;
  var flagCapexRisk = ebeRetraite > 0 && (fd.capex||0) > ebeRetraite*0.15;

  var prixNet = valorisation - (fd.dettesExistantes||0) + (fd.tresorerie||0);
  var totalSources = (fd.apport||0) + (fd.detteBancaire||0) + (fd.vendeurMontant||0);
  var ecartFinancement = totalSources - valorisation;

  return {
    ebeRetraite:ebeRetraite, valorisation:valorisation,
    mensualiteBanque:mensualiteBanque, remboursementBancaireAnnuel:remboursementBancaireAnnuel,
    mensualiteVendeur:mensualiteVendeur, remboursementVendeurAnnuel:remboursementVendeurAnnuel,
    remboursementAnnuel:remboursementAnnuel,
    cashFlow:cashFlow, cashReturn:cashReturn, ratioRembEBE:ratioRembEBE,
    ebeStress1:ebeStress1, cfStress1:cfStress1, ebeStress2:ebeStress2, cfStress2:cfStress2,
    flagCashFlowPositif:flagCashFlowPositif, flagRatioOK:flagRatioOK, flagStressOK:flagStressOK, dealInteressant:dealInteressant,
    flagClientRisk:flagClientRisk, flagCapexRisk:flagCapexRisk,
    prixNet:prixNet, totalSources:totalSources, ecartFinancement:ecartFinancement
  };
}

function computeMultiYearProjection(fd, years) {
  years = years || 7;
  var ebeRetraite = (fd.ebeComptable||0) + ((fd.remuActuelle||0) - (fd.remuMarche||0)) + (fd.chargesExcep||0);
  var pmtBancaireAnnuel = pmtMonthly(fd.detteBancaire, fd.tauxPct, fd.dureeAnnees) * 12;
  var pmtVendeurAnnuel = pmtMonthly(fd.vendeurMontant, fd.vendeurTauxPct, fd.vendeurDureeAnnees) * 12;
  var croissance = (fd.croissanceCA||0)/100;

  var rows = [];
  for (var y = 1; y <= years; y++) {
    var ebeYear = ebeRetraite * Math.pow(1+croissance, y-1);
    var rembBanque = y <= (fd.dureeAnnees||0) ? pmtBancaireAnnuel : 0;
    var rembVendeur = y <= (fd.vendeurDureeAnnees||0) ? pmtVendeurAnnuel : 0;
    var totalRemb = rembBanque + rembVendeur;
    var cf = ebeYear - totalRemb - (fd.capex||0);
    var ratio = ebeYear !== 0 ? totalRemb/ebeYear : null;
    rows.push({ annee:y, ebe:ebeYear, rembBanque:rembBanque, rembVendeur:rembVendeur, totalRemb:totalRemb, cf:cf, ratio:ratio, ok: cf>=0 && (ratio===null || ratio<0.70) });
  }
  return rows;
}

function finInput(listingId, field, value) {
  var v = (value===0) ? '0' : (value||'');
  return '<input type="text" class="fin-input" value="'+esc(v)+'" onchange="PSR.updateFinancingField(\''+listingId+'\',\''+field+'\',this.value)">';
}
function finFieldRow(listingId, field, label, value) {
  return '<tr><td>'+esc(label)+'</td><td>'+finInput(listingId,field,value)+'</td></tr>';
}
function finComputedRow(label, value, warn) {
  return '<tr class="fin-computed'+(warn?' fin-warn':'')+'"><td><b>'+esc(label)+'</b></td><td class="mono"><b>'+esc(value)+'</b></td></tr>';
}

  var prixDemandeNum = parseNumberLoose(l.prix);

  html += finComputedRow('Lecture', statutTxt, oe.statutPrix==='hors_limite');
  html += '</table>';

  html += '<div class="form-divider">6. AJOUT — Création de valeur (thèse "belle endormie") &amp; sortie</div>';
  html += '<div class="fin-note">Impact EBE annuel estimé de chaque levier, une fois en régime de croisière. Reste prudent : mieux vaut sous-estimer ici et sur-délivrer ensuite.</div>';
  html += '<table class="dd-table fin-table"><tr><th>Variable</th><th>Valeur</th></tr>';
  html += finFieldRow(l.id,'leverDigital','Levier digital / prospection structurée (impact EBE €/an)', fd.leverDigital);
  html += finFieldRow(l.id,'leverPricing','Levier pricing / renégociation tarifaire (impact EBE €/an)', fd.leverPricing);
  html += finFieldRow(l.id,'leverAutre','Autres leviers (CRM, achats, offre…) (impact EBE €/an)', fd.leverAutre);
  html += finComputedRow('EBE post-leviers', fmtEUR(oe.ebePostLeviers));
  html += finFieldRow(l.id,'exitYears','Horizon de sortie (années)', fd.exitYears);
  html += finFieldRow(l.id,'exitMultiple','Multiple de sortie (× EBE)', fd.exitMultiple);
  html += finComputedRow('EBE projeté à la sortie (croissance CA appliquée)', fmtEUR(oe.ebeSortie));
  html += finComputedRow('Valeur d\'entreprise estimée à la sortie', fmtEUR(oe.valeurSortie));
  html += finComputedRow('Gain brut indicatif (valeur de sortie − prix demandé)', prixDemandeNum ? fmtEUR(oe.gainBrut) : '—');
  html += '</table>';
  html += '<div class="fin-note">Estimation volontairement grossière : elle ignore la dette résiduelle, les cash-flows accumulés et la fiscalité de cession. Elle sert à comparer des cibles entre elles, pas à promettre un gain.</div>';

  html += '<div class="dossier-actions"><button class="btn-danger btn-sm" onclick="PSR.toggleFinancingSelection(\''+l.id+'\')">Retirer du stress test</button></div>';
  html += '</div></div>';
  return html;
}

function viewFinancing() {
  var html = '';

function applyProposalsFromText(raw) {
  if (!raw || !raw.trim()) { showToast('Rien à traiter — texte vide.'); return false; }
  var cleaned = raw.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  var parsed;
  try { parsed = JSON.parse(cleaned); }
  catch(e) { showToast('JSON invalide — vérifie que le bloc est complet.'); return false; }
  if (!Array.isArray(parsed) || parsed.length === 0) { showToast('Le JSON doit être un tableau de propositions.'); return false; }
  var valid = parsed.every(function(p){ return p && p.id && p.name && Array.isArray(p.criteria); });
  if (!valid) { showToast('Chaque proposition doit au moins avoir id, name et criteria.'); return false; }
  state.currentProposals = parsed;
  state.currentProposalsUpdatedAt = new Date().toISOString();
  persist();
  ui.modal = null;
  ui.tab = 'recherche';
  showToast(parsed.length + ' nouvelle(s) proposition(s) chargée(s).');
  render();
  return true;
}

async function callAgent(action, prompt) {
  var res = await sb.functions.invoke('ai-agent', { body: { action: action, prompt: prompt, agentMemory: state.agentMemory || '' } });
  if (res.error) { throw new Error(res.error.message || String(res.error)); }
  if (res.data && res.data.error) { throw new Error(res.data.error); }
  return res.data && res.data.text;
}

function applyCustomDDFromText(sourceId, raw) {
  if (!raw || !raw.trim()) { showToast('Rien à traiter — texte vide.'); return false; }
  var cleaned = raw.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  var parsed;
  try { parsed = JSON.parse(cleaned); }
  catch(e) { showToast('JSON invalide — vérifie que le bloc est complet.'); return false; }
  if (!parsed || !Array.isArray(parsed.sections) || !parsed.verdict) {
    showToast('Le JSON doit contenir au moins "verdict" et "sections".');
    return false;
  }
  state.customDD[sourceId] = parsed;
  persist();
  ui.modal = null;
  ui.tab = 'dd';
  ui.ddSelected = sourceId;
  showToast('Due diligence installée.');
  render();
  return true;
}

    callAgent('dd', prompt).then(function(text){
      var ok = applyCustomDDFromText(l.sourceId, text);
      if (!ok) { var el = document.getElementById('psr-auto-status-dd'); if (el) el.textContent = 'Réponse reçue mais non exploitable telle quelle — utilise le mode manuel ci-dessous.'; }
    }).catch(function(err){
      var el = document.getElementById('psr-auto-status-dd');
      if (el) el.textContent = 'Erreur : ' + err.message;
    });
  },

  applyCustomDD: function(listingId) {
    var l = findSaved(listingId);
    if (!l) return;
    var el = document.getElementById('psr-dd-paste-'+listingId);
    if (!el) return;
    var raw = el.value.trim();
    if (!raw) { showToast('Colle d\'abord le bloc JSON que je t\'ai donné dans le chat.'); return; }
    applyCustomDDFromText(l.sourceId, raw);
  },

  requestDeepenDD: function(sourceId) {
    var text = buildDeepenPrompt(sourceId);
    try { navigator.clipboard.writeText(text); } catch(e) {}
    ui.modal = 'deepenDD'; ui.modalCtx = sourceId;
    render();
  },

  applyDeepenDD: function(sourceId) {
    var el = document.getElementById('psr-deepen-paste-'+sourceId);
    if (!el) return;
    var raw = el.value.trim();
    if (!raw) { showToast('Colle d\'abord le bloc JSON que je t\'ai donné dans le chat.'); return; }
    var cleaned = raw.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    var parsed;
    try { parsed = JSON.parse(cleaned); }
    catch(e) { showToast('JSON invalide — vérifie que le bloc est complet.'); return; }
    if (!parsed || !Array.isArray(parsed.newSections)) {
      showToast('Le JSON doit contenir au moins "newSections" (tableau).');
      return;
    }
    if (!state.ddAddenda[sourceId]) state.ddAddenda[sourceId] = { sections: [], verdictOverride: null, verdictToneOverride: null };
    state.ddAddenda[sourceId].sections = state.ddAddenda[sourceId].sections.concat(parsed.newSections);
    if (parsed.updatedVerdict) state.ddAddenda[sourceId].verdictOverride = parsed.updatedVerdict;
    if (parsed.updatedVerdictTone) state.ddAddenda[sourceId].verdictToneOverride = parsed.updatedVerdictTone;
    persist();
    ui.modal = null;
    showToast('Approfondissement ajouté à la DD.');
    render();
  },

  prepareQuestion: function(key, context) {
    var ta = document.getElementById('psr-question-'+key);
    var q = ta.value.trim();
    if (!q) { showToast('Écris une question avant de continuer.'); return; }

    var contextText = '';
    if (context === 'dd') {
      var dd = getDD(key);
      var prop = findProposal(key);
      contextText = "Dossier concerné : " + (prop?prop.name:key) + " (due diligence du " + (dd?dd.dateAnalyse:'—') + ").";
    } else if (context === 'compare') {
      var ids = key.replace('compare-','').split('-');
      var names = state.savedListings.filter(function(l){return ids.indexOf(l.id)!==-1;}).map(function(l){return l.name;});
      contextText = "Comparaison en cours entre : " + names.join(' / ') + ".";
    }
    var text = contextText + "\n\nMa question : " + q + "\n\n(Réponds directement dans le chat ; je collerai ta réponse dans la case dédiée sous cette question.)";
    var agentText = contextText + "\n\nMa question : " + q;

    if (!state.questionsLog[key]) state.questionsLog[key] = [];
    state.questionsLog[key].push({ q: q, a: null, date: new Date().toISOString(), fullPrompt: agentText });
    persist();

    try { navigator.clipboard.writeText(text); } catch(e) {}
    ui.modal = 'questionPrepared'; ui.modalCtx = { text: text };
    render();
  }
};

loadState();

})();
</script>
</body>
</html>
